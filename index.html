
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --s900:#0a0f1a;--s800:#0f172a;--s700:#1e293b;--s600:#273548;--s500:#334155;
  --s400:#475569;--s300:#64748b;--s200:#94a3b8;--s100:#cbd5e1;--s50:#f1f5f9;
  --ora:#f97316;--orad:#ea580c;--text:#f1f5f9;--muted:#94a3b8;--hint:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
}
body{font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:var(--s900);color:var(--text)}
#app{display:grid;grid-template-columns:230px 1fr;min-height:620px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
/* ─ Sidebar */
#sidebar{background:var(--s800);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;max-height:620px}
.sb-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-logo{width:28px;height:28px;background:var(--ora);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-title{font-size:12px;font-weight:600;color:var(--text)}
.sb-sub{font-size:10px;color:var(--hint)}
.sb-body{padding:12px;display:flex;flex-direction:column;gap:14px;flex:1}
.section-label{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field{display:flex;flex-direction:column;gap:3px}
.field-row{display:flex;justify-content:space-between;align-items:center}
.field-row label{font-size:11px;color:var(--muted)}
.field-row .val{font-size:11px;font-weight:600;color:var(--ora)}
input[type=range]{width:100%;height:2px;border-radius:2px;outline:none;cursor:pointer;background:var(--s600);accent-color:var(--ora)}
.preset-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.preset{border:1px solid var(--border);border-radius:6px;padding:5px 4px;cursor:pointer;background:transparent;text-align:center;transition:all .15s;font-family:inherit}
.preset:hover{border-color:var(--ora);color:var(--ora)}
.preset.active{border-color:var(--ora);background:rgba(249,115,22,.12);color:var(--ora)}
.preset .pn{font-size:10px;font-weight:600;color:inherit;display:block}
.preset .ps{font-size:9px;color:var(--hint);display:block}
.ratio-bar{height:4px;border-radius:2px;overflow:hidden;display:flex;margin-top:4px}
.ratio-online{background:var(--ora);transition:width .2s}
.ratio-offline{flex:1;background:#3b82f6}
.ratio-labels{display:flex;justify-content:space-between;font-size:9px;margin-top:2px}
.pat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pat{border:1px solid var(--border);border-radius:7px;padding:7px 6px;cursor:pointer;background:var(--s700);text-align:left;transition:all .15s;font-family:inherit}
.pat:hover{border-color:var(--s300)}
.pat.on{border-color:var(--ora);background:rgba(249,115,22,.1)}
.pat .pe{font-size:16px;display:block;line-height:1}
.pat .pn{font-size:10px;font-weight:600;color:var(--text);display:block;margin-top:3px}
.pat .pd{font-size:9px;color:var(--hint);display:block}
.pat .pc{font-size:9px;color:var(--ora);display:none}
.pat.on .pc{display:block}
.gen-btn{margin:12px;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--ora),var(--orad));color:#fff;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .15s;font-family:inherit;box-shadow:0 4px 14px rgba(249,115,22,.3)}
.gen-btn:hover{opacity:.88}
.gen-btn:active{transform:scale(.98)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
/* ─ Main */
#main{background:var(--s900);display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.main-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.toolbar{display:flex;gap:5px;align-items:center}
.tool-btn{border:1px solid var(--border2);border-radius:6px;padding:4px 9px;cursor:pointer;background:var(--s700);font-family:inherit;font-size:11px;color:var(--muted);transition:all .15s;white-space:nowrap}
.tool-btn:hover{border-color:var(--s300);color:var(--text)}
.tool-btn.on{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.1)}
.tool-btn.orange{border-color:var(--ora);color:var(--ora);background:rgba(249,115,22,.1)}
/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 14px;flex-shrink:0}
.gcard{border:1px solid var(--border);border-radius:8px;padding:9px;cursor:pointer;transition:all .15s;background:var(--s800)}
.gcard:hover{border-color:var(--s400)}
.gcard.sel{border-color:var(--ora);background:rgba(249,115,22,.07)}
.gcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.gcard-score{font-size:20px;font-weight:700;line-height:1}
.gcard-lbl{font-size:9px;font-weight:600;margin-top:1px}
.gcard-name{font-size:10px;font-weight:600;color:var(--text)}
.gcard-desc{font-size:9px;color:var(--hint);margin-top:1px}
.mini-bars{display:flex;flex-direction:column;gap:2px;margin-top:5px}
.mbar-row{display:flex;align-items:center;gap:3px}
.mbar-row span{font-size:8.5px;color:var(--hint);width:36px;flex-shrink:0}
.mbar-bg{flex:1;height:2.5px;background:var(--s600);border-radius:2px}
.mbar-fill{height:100%;border-radius:2px;transition:width .5s}
.badges-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.badge{font-size:8.5px;padding:1.5px 5px;border-radius:10px;font-weight:600}
.badge-g{background:rgba(16,185,129,.15);color:#34d399}
.badge-y{background:rgba(234,179,8,.15);color:#fbbf24}
.badge-r{background:rgba(239,68,68,.15);color:#f87171}
/* Detail area */
#detail{flex:1;display:grid;grid-template-columns:1fr 260px;gap:0;overflow:hidden;border-top:1px solid var(--border)}
#canvas-area{padding:12px;overflow:hidden;display:flex;flex-direction:column;gap:8px}
#canvas-wrap{border-radius:8px;overflow:hidden;border:1px solid var(--border2);background:#fff;flex:1}
#canvas-wrap svg{display:block;width:100%}
.canvas-toolbar{display:flex;gap:5px;justify-content:flex-end}
/* Legend */
#legend{display:none;background:var(--s800);border:1px solid var(--border);border-radius:8px;padding:10px}
#legend.show{display:block}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-top:5px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-swatch{width:10px;height:10px;border-radius:2px;border:0.5px solid rgba(0,0,0,.2);flex-shrink:0}
.legend-label{font-size:9.5px;color:var(--muted)}
/* Analysis panel */
#analysis{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ana-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ana-tab{flex:1;padding:8px 4px;border:none;background:transparent;font-family:inherit;font-size:10px;font-weight:600;color:var(--hint);cursor:pointer;transition:all .15s;text-align:center;border-bottom:2px solid transparent}
.ana-tab:hover{color:var(--muted)}
.ana-tab.on{color:var(--ora);border-bottom-color:var(--ora)}
.ana-body{flex:1;overflow-y:auto;padding:10px}
/* Score tab */
.score-hero{background:var(--s800);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.score-num{font-size:36px;font-weight:700;line-height:1}
.score-lbl{font-size:10px;font-weight:600;margin-top:2px}
.score-icon{font-size:24px;text-align:right}
.score-name{font-size:11px;color:var(--muted);margin-top:2px;text-align:right}
.rating-badges{display:flex;flex-direction:column;gap:3px;background:var(--s800);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px}
.rating-row{display:flex;justify-content:space-between;align-items:center}
.rating-row .rl{font-size:10px;color:var(--hint)}
.rating-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px}
.crit-list{display:flex;flex-direction:column;gap:5px}
.crit{background:var(--s800);border:1px solid var(--border);border-radius:7px;padding:8px}
.crit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.crit-name{font-size:10px;font-weight:600;color:var(--text)}
.crit-score{font-size:10px;font-weight:700;tabular-nums}
.crit-bar{height:2.5px;background:var(--s600);border-radius:2px;overflow:hidden;margin-bottom:3px}
.crit-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.crit-note{font-size:9px;color:var(--hint);line-height:1.4}
/* Analysis tab */
.ana-section{border:1px solid;border-radius:7px;padding:8px;margin-bottom:6px}
.ana-section h4{font-size:9.5px;font-weight:600;margin-bottom:5px}
.ana-section ul{padding-left:12px;display:flex;flex-direction:column;gap:2px}
.ana-section li{font-size:9.5px;color:var(--muted);line-height:1.4}
.ana-rec{font-size:9.5px;color:var(--muted);line-height:1.5}
.sec-str{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05)}
.sec-str h4{color:#34d399}
.sec-weak{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.sec-weak h4{color:#f87171}
.sec-bot{border-color:rgba(234,179,8,.2);background:rgba(234,179,8,.04)}
.sec-bot h4{color:#fbbf24}
.sec-rec{border-color:rgba(59,130,246,.2);background:rgba(59,130,246,.04)}
.sec-rec h4{color:#60a5fa}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.metric-card{background:var(--s800);border:1px solid var(--border);border-radius:6px;padding:6px;text-align:center}
.metric-label{font-size:9px;color:var(--hint);margin-bottom:2px}
.metric-val{font-size:11px;font-weight:600;color:var(--text)}
.metric-sub{font-size:8px;color:var(--hint);margin-top:1px}
/* Compare mode */
#compare-area{display:none;grid-template-columns:1fr 1fr;gap:12px;padding:10px 14px;overflow-y:auto}
#compare-area.show{display:grid}
.compare-panel{display:flex;flex-direction:column;gap:8px;border:1px solid var(--border);border-radius:8px;padding:10px}
.cv-wrap{border-radius:6px;overflow:hidden;border:1px solid var(--border2);background:#fff}
.cv-wrap svg{display:block;width:100%;height:auto}
.cv-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
@media(max-width:1200px){#app{grid-template-columns:1fr};#sidebar{position:absolute;top:0;left:0;width:230px;height:100%;z-index:10;max-height:100vh}#main{margin-left:0}#detail{grid-template-columns:1fr}#analysis{display:none}}
@media(max-width:768px){.gallery{grid-template-columns:repeat(2,1fr)}.metrics-grid{grid-template-columns:1fr}}
</style>

<div id="app">
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">🍚</div>
      <div>
        <div class="sb-title">CƠM TẤM PRO</div>
        <div class="sb-sub">Layout Design</div>
      </div>
    </div>
    <div class="sb-body">
      <div>
        <div class="section-label">💡 Presets</div>
        <div class="preset-row" id="preset-row"></div>
      </div>
      <div>
        <div class="section-label">🎨 Patterns</div>
        <div class="pat-grid" id="pat-grid"></div>
      </div>
      <button class="gen-btn" onclick="generate()">Generate Layout</button>
    </div>
  </div>

  <div id="main">
    <div class="main-header">
      <span class="main-title">Layout Design Studio</span>
      <div class="toolbar">
        <button class="tool-btn" id="flow-btn" onclick="toggleFlow()">📊 Flow</button>
        <button class="tool-btn" id="legend-btn" onclick="toggleLegend()">🔑 Legend</button>
        <button class="tool-btn" id="compare-btn" onclick="toggleCompare()">⚖️ Compare</button>
        <button class="tool-btn orange" id="export-btn" onclick="exportPNG()">💾 Export</button>
      </div>
    </div>

    <div id="legend">
      <div style="font-size:10px;color:var(--muted);margin-bottom:5px">Key Areas</div>
      <div class="legend-grid" id="legend-grid"></div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="detail">
      <div id="canvas-area">
        <div id="canvas-wrap"></div>
      </div>
      <div id="analysis">
        <div class="ana-tabs">
          <button class="ana-tab on" onclick="setTab('score',this)">Điểm</button>
          <button class="ana-tab" onclick="setTab('analysis',this)">Phân tích</button>
          <button class="ana-tab" onclick="setTab('metrics',this)">Chi tiết</button>
        </div>
        <div class="ana-body" id="ana-body"></div>
      </div>
    </div>

    <div id="compare-area"></div>
  </div>
</div>

<script>
// ─── Data ─────────────────────────────────────────────────────────
const layouts=[
  {id:'l1',name:'Linear Small',emoji:'🟤',s:{tN:6,kA:12,packA:8,seatA:24,pickA:8,fl:25,cap:20,sep:18,ops:12,scl:8,total:83}},
  {id:'l2',name:'L-Shaped',emoji:'🟠',s:{tN:8,kA:15,packA:10,seatA:32,pickA:10,fl:28,cap:23,sep:19,ops:14,scl:9,total:93}},
  {id:'l3',name:'Island Layout',emoji:'🔴',s:{tN:10,kA:18,packA:12,seatA:40,pickA:12,fl:30,cap:25,sep:20,ops:15,scl:10,total:100}},
  {id:'l4',name:'Chain Standard',emoji:'🟡',s:{tN:12,kA:20,packA:14,seatA:48,pickA:14,fl:29,cap:24,sep:19,ops:15,scl:10,total:97}},
];

const ANA={
  l1:{rev:'Doanh thu trung bình',spd:'Tốc độ trung bình',exp:'Trải nghiệm khách tốt',str:['Tiết kiệm chi phí','Dễ quản lý','Phù hợp nhỏ lẻ'],weak:['Khả năng tăng trưởng hạn chế','Luồng có thể giao cắt'],bot:['Giờ cao điểm dễ tắc'],rec:'Phù hợp cho quán nhỏ, <5 nhân viên. Nếu mở rộng cần chuyển sang L-Shaped.'},
  l2:{rev:'Doanh thu cao',spd:'Tốc độ nhanh',exp:'Trải nghiệm khách rất tốt',str:['Luồng rõ ràng','Dễ tăng bàn','Phù hợp để tái đầu tư chain'],weak:['Yêu cầu không gian hình L'],bot:['Nếu tối ưu hóa kém'],rec:'Tiêu chuẩn cho 1 quán trước khi chain. Dễ replicate 100%.'},
  l3:{rev:'Doanh thu xuất sắc',spd:'Tốc độ nhanh nhất',exp:'Trải nghiệm khách xuất sắc',str:['Tối ưu dòng chảy','Công suất cao','Dễ chain hóa'],weak:['Yêu cầu không gian lớn','Chi phí vận hành cao'],bot:['Ít rủi ro nếu quản lý tốt'],rec:'Mô hình chain tối ưu (10–20 quán). Đầu tư dài hạn.'},
  l4:{rev:'Doanh thu cao',spd:'Tốc độ rất nhanh',exp:'Trải nghiệm khách tốt',str:['Tiêu chuẩn chain','Dễ training','Hiệu quả cao'],weak:['Yêu cầu chi phí ban đầu cao'],bot:['Quản lý phức tạp hơn'],rec:'Phù hợp chain 10–20 quán. Đã thử nghiệm, có SOP chi tiết.'},
};

let selId='l3';
let activeTab='score';
let showFlow=false;
let showLegend=false;
let compareMode=false;

// ─── SVG Builder ──────────────────────────────────────────────────
function buildSVG(layout,showFlow,large=true){
  const {s,emoji}=layout;
  const w=large?600:250,h=large?480:200;
  const scale=w/50;
  
  let svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/></pattern>
  </defs>
  <rect width="${w}" height="${h}" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  <rect width="${w}" height="${h}" fill="url(#grid)" opacity="0.3"/>`;
  
  const drawZone=(label,x,y,ww,hh,bg,stroke='#333')=>{
    svg+=`<g><rect x="${x}" y="${y}" width="${ww}" height="${hh}" fill="${bg}" stroke="${stroke}" stroke-width="2" rx="4"/><text x="${x+5}" y="${y+20}" font-size="12" font-weight="600" fill="${stroke==='#333'?'#333':'#fff'}">${label}</text></g>`;
  };
  
  if(layout.id==='l1'){
    drawZone('Khách',50,50,300,200,'#ffe5cc');
    drawZone('Gói',370,50,120,200,'#fff4e6');
    drawZone('Bếp',50,270,200,100,'#ffd699');
    drawZone('Pick',270,270,220,100,'#ffed99');
  } else if(layout.id==='l2'){
    drawZone('Khách',50,50,250,250,'#ffe5cc');
    drawZone('Gói',320,50,150,150,'#fff4e6');
    drawZone('Pick',320,220,150,80,'#ffed99');
    drawZone('Bếp',50,320,270,50,'#ffd699');
  } else if(layout.id==='l3'){
    drawZone('Khách',50,50,200,300,'#ffe5cc');
    drawZone('Bếp',270,50,150,150,'#ffd699');
    drawZone('Gói',270,220,150,80,'#fff4e6');
    drawZone('Pick',270,320,150,30,'#ffed99');
  } else {
    drawZone('Khách',50,50,250,250,'#ffe5cc');
    drawZone('Bếp',320,50,150,130,'#ffd699');
    drawZone('Gói',50,320,200,50,'#fff4e6');
    drawZone('Pick',270,320,200,50,'#ffed99');
  }
  
  svg+=`</svg>`;
  return svg;
}

function scoreColor(s){if(s>=90)return'#34d399';if(s>=75)return'#fbbf24';return'#f87171';}
function scoreLabel(s){if(s>=90)return'Xuất sắc';if(s>=75)return'Tốt';if(s>=60)return'Chấp nhận';return'Cần cải thiện';}

function rcls(v){return v.includes('Rất')||v.includes('Xuất')?'badge-g':v.includes('cao')||v.includes('Cao')||v.includes('Tốt')||v.includes('nhanh')||v.includes('Nhanh')?'badge-g':v.includes('Trung')?'badge-y':'badge-r';}

function generate(){
  renderGallery();
  renderDetail();
}

function renderGallery(){
  const g=document.getElementById('gallery');
  g.innerHTML='';
  layouts.forEach(l=>{
    const d=document.createElement('div');
    d.className='gcard'+(l.id===selId?' sel':'');
    const sc=scoreColor(l.s.total);
    const an=ANA[l.id];
    d.innerHTML=`
    <div class="gcard-top">
      <div><div class="gcard-score" style="color:${sc}">${l.s.total}</div><div class="gcard-lbl" style="color:${sc}">${scoreLabel(l.s.total)}</div></div>
    </div>
    <div class="mini-bars">
      ${[['Flow',l.s.fl,30],['Cap',l.s.cap,25],['Tách',l.s.sep,20],['Ops',l.s.ops,15],['Scale',l.s.scl,10]].map(([n,v,m])=>`<div class="mbar-row"><span>${n}</span><div class="mbar-bg"><div class="mbar-fill" style="width:${(v/m*100).toFixed(0)}%;background:${sc}"></div></div></div>`).join('')}
    </div>
    <div class="badges-row">
      <span class="badge ${rcls(an.rev)}">📈 ${an.rev}</span>
      <span class="badge ${rcls(an.spd)}">⚡ ${an.spd}</span>
      <span class="badge ${rcls(an.exp)}">😊 ${an.exp}</span>
    </div>`;
    d.onclick=()=>{selId=l.id;renderGallery();renderDetail();if(compareMode)renderCompare();};
    g.appendChild(d);
  });
}

function setTab(t,el){
  activeTab=t;
  document.querySelectorAll('.ana-tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderAnalysis();
}

function renderDetail(){
  const l=layouts.find(x=>x.id===selId);if(!l)return;
  document.getElementById('canvas-wrap').innerHTML=buildSVG(l,showFlow);
  renderAnalysis();
}

function renderAnalysis(){
  const l=layouts.find(x=>x.id===selId);if(!l)return;
  const {s}=l;const sc=scoreColor(s.total);const an=ANA[l.id];
  const body=document.getElementById('ana-body');
  if(activeTab==='score'){
    body.innerHTML=`
    <div class="score-hero">
      <div><div style="font-size:10px;color:var(--hint);margin-bottom:2px">Điểm tổng hợp</div><div class="score-num" style="color:${sc}">${s.total}</div><div class="score-lbl" style="color:${sc}">${scoreLabel(s.total)}</div></div>
      <div><div class="score-icon">${l.emoji}</div><div class="score-name">${l.name}</div></div>
    </div>
    <div class="rating-badges">
      ${[['📈 Doanh thu',an.rev],['⚡ Tốc độ phục vụ',an.spd],['😊 Trải nghiệm khách',an.exp]].map(([lb,v])=>`<div class="rating-row"><span class="rl">${lb}</span><span class="rating-badge ${rcls(v)}" style="background:${rcls(v)==='badge-g'?'rgba(16,185,129,.15)':rcls(v)==='badge-y'?'rgba(234,179,8,.15)':'rgba(239,68,68,.15)'};color:${rcls(v)==='badge-g'?'#34d399':rcls(v)==='badge-y'?'#fbbf24':'#f87171'}">${v}</span></div>`).join('')}
    </div>
    <div class="crit-list">
    ${[
      ['🔄 Luồng vận hành',s.fl,30,'Không giao cắt giờ cao điểm'],
      ['📊 Công suất',s.cap,25,`${s.tN} bàn · đóng gói ${s.packA}m²`],
      ['🚦 Tách luồng',s.sep,20,'Khách / NV / Shipper'],
      ['⚙️ Dễ vận hành',s.ops,15,`Bếp ${s.kA}m² · 1 chiều`],
      ['🔗 Nhân bản chuỗi',s.scl,10,'Chuẩn hóa cho chain'],
    ].map(([cn,cv,cm,note])=>`
    <div class="crit"><div class="crit-header"><span class="crit-name">${cn}</span><span class="crit-score" style="color:${scoreColor(cv/cm*100)}">${cv}/${cm}</span></div><div class="crit-bar"><div class="crit-bar-fill" style="width:${(cv/cm*100).toFixed(0)}%;background:${scoreColor(cv/cm*100)}"></div></div><div class="crit-note">${note}</div></div>`).join('')}
    </div>`;
  } else if(activeTab==='analysis'){
    body.innerHTML=`
    <div class="ana-section sec-str"><h4>✅ Điểm mạnh</h4><ul>${an.str.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="ana-section sec-weak"><h4>⚠️ Điểm yếu</h4><ul>${an.weak.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="ana-section sec-bot"><h4>🚨 Nguy cơ tắc nghẽn</h4><ul>${an.bot.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="ana-section sec-rec"><h4>💡 Khuyến nghị</h4><p class="ana-rec">${an.rec}</p></div>`;
  } else {
    const tn=s.tN,seats=tn*4,orders=Math.round(3*25*.7+tn*3.5*.3);
    body.innerHTML=`<div class="metrics-grid">
    ${[
      ['🪑 Số bàn',`${tn} bàn`,''],
      ['👥 Sức chứa',`${seats} ghế`,'4 ghế/bàn'],
      ['🍳 Bếp',`${s.kA}m²`,'sơ chế + nấu'],
      ['📦 Đóng gói',`${s.packA}m²`,'3 bàn gói'],
      ['🛋 Khu khách',`${s.seatA}m²`,''],
      ['🛵 Pickup',`${s.pickA}m²`,'pick-up zone'],
      ['📱 Đơn/giờ','75–100 đơn','giờ cao điểm'],
      ['🔥 Peak',`~${orders} phần/h`,''],
      ['🔄 Turnover','3–4 lần/giờ','per table'],
    ].map(([lb,v,sub])=>`<div class="metric-card"><div class="metric-label">${lb}</div><div class="metric-val">${v}</div>${sub?`<div class="metric-sub">${sub}</div>`:''}</div>`).join('')}
    </div>`;
  }
}

function renderCompare(){
  const ca=document.getElementById('compare-area');
  const visible=layouts.slice(0,Math.min(2,layouts.length));
  ca.innerHTML=visible.map(l=>`
  <div class="compare-panel">
    <div class="cv-wrap">${buildSVG(l,showFlow,false)}</div>
    <div class="cv-footer">
      <span style="font-size:11px;font-weight:600;color:var(--text)">${l.emoji} ${l.name}</span>
      <span style="font-size:16px;font-weight:700;color:${scoreColor(l.s.total)}">${l.s.total}</span>
    </div>
  </div>`).join('');
}

function toggleFlow(){
  showFlow=!showFlow;
  document.getElementById('flow-btn').classList.toggle('on',showFlow);
  if(layouts.length){renderDetail();if(compareMode)renderCompare();}
}

function toggleLegend(){
  showLegend=!showLegend;
  document.getElementById('legend-btn').classList.toggle('on',showLegend);
  document.getElementById('legend').classList.toggle('show',showLegend);
}

function toggleCompare(){
  compareMode=!compareMode;
  document.getElementById('compare-btn').classList.toggle('on',compareMode);
  const det=document.getElementById('detail');
  const ca=document.getElementById('compare-area');
  if(compareMode){ca.classList.add('show');det.style.display='none';renderCompare();}
  else{ca.classList.remove('show');det.style.display='grid';}
}

function exportPNG(){
  const l=layouts.find(x=>x.id===selId);if(!l)return;
  const svgStr=buildSVG(l,showFlow);
  const canvas=document.createElement('canvas');
  canvas.width=1280;canvas.height=1000;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  const img=new Image();
  img.onload=()=>{ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=`layout-${l.id}.png`;a.click();};
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
}

generate();
</script>
